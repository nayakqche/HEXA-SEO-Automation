<svg width="232" height="64" viewBox="0 0 232 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hexa Climate">
  <!--
    Brand mark: isometric cube wireframe.
    Outer hexagon = the cube silhouette (6 visible cube edges).
    Three spokes = the three cube edges that meet at the front vertex,
    which is drawn as an open ring at the geometric center.
  -->
  <g stroke="#1d4ed8" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Regular pointy-top hexagon, radius 26 around (32,32) -->
    <polygon points="32,6 54.52,19 54.52,45 32,58 9.48,45 9.48,19" />
    <!-- Three cube-edges from front corner, stopping at the ring's outer boundary -->
    <line x1="32"    y1="58" x2="32"    y2="36.5" />
    <line x1="9.48"  y1="19" x2="28.10" y2="29.75" />
    <line x1="54.52" y1="19" x2="35.90" y2="29.75" />
    <!-- Open center ring = the front vertex of the cube -->
    <circle cx="32" cy="32" r="4.5" stroke-width="3" />
  </g>
  <!-- Six outer cube vertices -->
  <g fill="#1d4ed8">
    <circle cx="32"    cy="6"  r="5" />
    <circle cx="54.52" cy="19" r="5" />
    <circle cx="54.52" cy="45" r="5" />
    <circle cx="32"    cy="58" r="5" />
    <circle cx="9.48"  cy="45" r="5" />
    <circle cx="9.48"  cy="19" r="5" />
  </g>
  <!-- Wordmark: stacked "Hexa" / "Climate" -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" fill="#0f172a">
    <text x="78" y="30" font-size="22">Hexa</text>
    <text x="78" y="52" font-size="22">Climate</text>
  </g>
</svg>
