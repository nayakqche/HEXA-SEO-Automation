<svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hexa Climate">
  <!-- Hexagonal wireframe mark with 6 vertex nodes, 3 spokes to a center ring. -->
  <g stroke="#1e40af" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Hexagon outline (pointy top) -->
    <polygon points="30,6 51,18 51,42 30,54 9,42 9,18" />
    <!-- Three spokes from alternating vertices to center -->
    <line x1="30" y1="6"  x2="30" y2="30" />
    <line x1="9"  y1="42" x2="30" y2="30" />
    <line x1="51" y1="42" x2="30" y2="30" />
    <!-- Center ring -->
    <circle cx="30" cy="30" r="3.2" stroke-width="2.6" />
  </g>
  <!-- Six vertex nodes -->
  <g fill="#1e40af">
    <circle cx="30" cy="6"  r="3.6" />
    <circle cx="51" cy="18" r="3.6" />
    <circle cx="51" cy="42" r="3.6" />
    <circle cx="30" cy="54" r="3.6" />
    <circle cx="9"  cy="42" r="3.6" />
    <circle cx="9"  cy="18" r="3.6" />
  </g>
  <!-- Wordmark, stacked -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" fill="#0f172a">
    <text x="70" y="28" font-size="22">Hexa</text>
    <text x="70" y="50" font-size="22">Climate</text>
  </g>
</svg>
